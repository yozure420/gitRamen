events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name app.gitramen.com;

        location / {
            proxy_pass http://gitramen_frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://gitramen_backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}