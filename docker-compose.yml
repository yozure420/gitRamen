services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gitramen_backend
    volumes:
      - sqlite_data:/app/db
    restart: always
    ports:
      - "8000:8000"
    networks:
      - gitramen-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gitramen_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
    networks:
      - gitramen-network

  nginx:
    image: nginx:alpine
    container_name: gitramen_nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: always
    networks:
      - gitramen-network
    # Nginxが準備完了か確認する設定を追加
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: gitramen_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      nginx:
        condition: service_started
    # linksでnginxコンテナへの名前解決を保証
    links:
      - nginx
    networks:
      - gitramen-network

networks:
  gitramen-network:
    driver: bridge

volumes:
  sqlite_data: