services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gitramen_backend
    volumes:
      - sqlite_data:/app/db
    restart: always
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gitramen_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: gitramen_nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: gitramen_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - nginx
    # cloudflaredがnginxの名前を解決できるように、
    # 共通のネットワーク（デフォルトで作成されます）に属している必要があります。

# --- ここを追加 ---
volumes:
  sqlite_data: